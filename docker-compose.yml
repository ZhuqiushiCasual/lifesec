version: '3.8'

services:

  api:
    build: ./backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SECRET_KEY: change-me-in-production
    ports:
      - "8000:8000"

  web:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  mysqldata:
